<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SHVIP — Finaliser la réservation</title>

<style>

body{
font-family:Arial,Helvetica,sans-serif;
background:#0c0c0c;
color:white;
margin:0;
}

.container{
max-width:900px;
margin:auto;
padding:40px 20px;
}

h1{
text-align:center;
margin-bottom:40px;
}

.card{
background:#111;
padding:30px;
border-radius:10px;
margin-bottom:20px;
}

input,select,textarea{
width:100%;
padding:12px;
margin-top:8px;
margin-bottom:15px;
border-radius:6px;
border:none;
}

button{
background:#c6a46c;
color:black;
padding:14px;
border:none;
border-radius:6px;
cursor:pointer;
width:100%;
font-weight:bold;
}

.summary{
background:#151515;
padding:20px;
border-radius:10px;
margin-bottom:30px;
}

.label{
color:#aaa;
font-size:13px;
}

.value{
font-size:16px;
margin-bottom:10px;
}

</style>
</head>

<body>

<div class="container">

<h1>Finaliser votre réservation</h1>

<div class="summary">

<div class="label">Référence</div>
<div id="ref" class="value"></div>

<div class="label">Trajet</div>
<div id="trajet" class="value"></div>

<div class="label">Date</div>
<div id="date" class="value"></div>

<div class="label">Véhicule</div>
<div id="vehicule" class="value"></div>

<div class="label">Prix estimé</div>
<div id="prix" class="value"></div>

</div>

<div class="card">

<form id="form">

<label>Nom</label>
<input id="nom" required>

<label>Téléphone</label>
<input id="telephone" required>

<label>Email</label>
<input id="email">

<label>Notes</label>
<textarea id="notes"></textarea>

<button type="submit">
Envoyer la demande
</button>

</form>

</div>

</div>

<script>

const params = new URLSearchParams(window.location.search);

const reference = params.get("reference") || "";
const depart = params.get("depart") || "";
const arrivee = params.get("arrivee") || "";
const date = params.get("date") || "";
const vehicule = params.get("vehicule") || "";
const prix = params.get("prix") || "Sur devis";

document.getElementById("ref").innerText = reference;
document.getElementById("trajet").innerText = depart + " → " + arrivee;
document.getElementById("date").innerText = date;
document.getElementById("vehicule").innerText = vehicule;
document.getElementById("prix").innerText = prix + " €";

document.getElementById("form").addEventListener("submit",async function(e){

e.preventDefault();

const payload = {

reference: reference,
nom: document.getElementById("nom").value,
telephone: document.getElementById("telephone").value,
email: document.getElementById("email").value,

depart: depart,
arrivee: arrivee,
date_course: date,
type_vehicule: vehicule,
prix: prix,

notes: document.getElementById("notes").value

};

await fetch("https://https://htblfillncczsfteciyy.supabase.co",{

method:"POST",

headers:{
"Content-Type":"application/json",
"apikey":"sb_publishable_yh-guGKPlaJBtqCxAtC0QA_N12x0zyA",
"Authorization":"Bearer TA_PUBLIC_ANON_KEY"
},

body:JSON.stringify(payload)

});

alert("Demande envoyée avec succès.");

});

</script>

</body>
</html>
